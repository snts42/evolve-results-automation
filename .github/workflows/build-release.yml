name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags with objects
        run: git fetch --tags --force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "EvolveResultsAutomation" `
            --icon "evolve_results_automation/app.ico" `
            --add-data "evolve_results_automation/app.ico;evolve_results_automation" `
            --hidden-import "customtkinter" `
            --collect-all "customtkinter" `
            evolve_results_automation/__main__.py

      - name: Extract tag annotation
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $subject = git tag -l $tag --format="%(contents:subject)"
          $bodyLines = git tag -l $tag --format="%(contents:body)"
          $body = $bodyLines -join "`n"

          if (-not $body -and -not $subject) {
            $output = "Release $tag"
          } elseif ($body) {
            $output = "$subject`n`n$body"
          } else {
            $output = $subject
          }

          $output.Trim() | Out-File -FilePath "release_body.md" -Encoding utf8 -NoNewline

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: dist/EvolveResultsAutomation.exe
          draft: false
          prerelease: false
