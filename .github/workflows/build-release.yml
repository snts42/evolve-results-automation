name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags with objects
        run: git fetch --tags --force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (folder mode)
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name "EvolveResultsAutomation" `
            --contents-directory "_internal" `
            --icon "evolve_results_automation/app.ico" `
            --add-data "evolve_results_automation/app.ico;evolve_results_automation" `
            --hidden-import "customtkinter" `
            --collect-data "customtkinter" `
            --exclude-module "selenium.webdriver.common.devtools" `
            --exclude-module "numpy" `
            --exclude-module "PIL" `
            --exclude-module "Pillow" `
            --exclude-module "lxml" `
            --exclude-module "psutil" `
            --exclude-module "yaml" `
            --exclude-module "pandas" `
            --exclude-module "cryptography" `
            --exclude-module "unittest" `
            --exclude-module "xmlrpc" `
            --exclude-module "pydoc" `
            --exclude-module "ftplib" `
            --exclude-module "imaplib" `
            --exclude-module "smtplib" `
            --exclude-module "asyncio" `
            --exclude-module "_asyncio" `
            evolve_results_automation/__main__.py

      - name: Remove unused Selenium data (platform binaries + unused browsers)
        shell: pwsh
        run: |
          $internal = "dist/EvolveResultsAutomation/_internal"
          $patterns = @(
            "$internal/selenium/webdriver/common/macos",
            "$internal/selenium/webdriver/common/linux",
            "$internal/selenium/webdriver/firefox",
            "$internal/selenium/webdriver/edge",
            "$internal/selenium/webdriver/ie",
            "$internal/selenium/webdriver/safari"
          )
          foreach ($p in $patterns) {
            if (Test-Path $p) {
              Remove-Item -Recurse -Force $p
              Write-Host "Removed $p"
            }
          }

      - name: Prune Tcl/Tk data (msgs, tzdata, demos, CJK encodings)
        shell: pwsh
        run: |
          $internal = "dist/EvolveResultsAutomation/_internal"

          # Remove entire directories that are never used
          $patterns = @(
            "$internal/_tcl_data/msgs",
            "$internal/_tk_data/msgs",
            "$internal/_tcl_data/tzdata",
            "$internal/_tk_data/demos",
            "$internal/_tk_data/images",
            "$internal/_tcl_data/opt*",
            "$internal/_tcl_data/http*",
            "$internal/tcl8"
          )
          foreach ($p in $patterns) {
            foreach ($match in (Get-Item $p -ErrorAction SilentlyContinue)) {
              Remove-Item -Recurse -Force $match
              Write-Host "Removed $match"
            }
          }

          # Prune CJK encodings from _tcl_data/encoding (keep Western only)
          $encDir = "$internal/_tcl_data/encoding"
          if (Test-Path $encDir) {
            $keep = @("ascii.enc","utf-8.enc","cp1252.enc","cp1251.enc","cp1250.enc","iso8859-1.enc","iso8859-15.enc","iso8859-2.enc")
            Get-ChildItem $encDir -File | Where-Object { $keep -notcontains $_.Name } | ForEach-Object {
              Remove-Item $_.FullName -Force
            }
            Write-Host "Pruned CJK encodings, kept $($keep.Count) Western files"
          }

      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/EvolveResultsAutomation" -DestinationPath "dist/EvolveResultsAutomation.zip"

      - name: Extract tag annotation
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $subject = git tag -l $tag --format="%(contents:subject)"
          $bodyLines = git tag -l $tag --format="%(contents:body)"
          $body = $bodyLines -join "`n"

          if (-not $body -and -not $subject) {
            $output = "Release $tag"
          } elseif ($body) {
            $output = "$subject`n`n$body"
          } else {
            $output = $subject
          }

          $output.Trim() | Out-File -FilePath "release_body.md" -Encoding utf8 -NoNewline

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: dist/EvolveResultsAutomation.zip
          draft: false
          prerelease: false
